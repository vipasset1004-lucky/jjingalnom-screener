<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="진짜 갈놈" />
  <title>진짜 갈놈 — 3중 검증 추천주</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #131a2b;
      --panel-2: #1a2238;
      --line: #243152;
      --txt: #e6ecff;
      --mut: #8a97c0;
      --acc: #4cc2ff;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --gold: #fbbf24;
      --a: #4cc2ff;
      --b: #c084fc;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: rgba(76,194,255,.2); }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; padding: 0;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      font: 14px/1.5 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--txt);
      overscroll-behavior-y: contain;
    }
    a { color: var(--acc); text-decoration: none; }
    header {
      padding: 18px 20px 12px;
      padding-top: max(18px, env(safe-area-inset-top));
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #0e1424 0%, #0b0f1a 100%);
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: -.3px; }
    h1 .sub { font-size: 12px; color: var(--mut); margin-left: 8px; font-weight: 400; }
    .regime {
      display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--mut);
      margin-top: 8px;
    }
    .regime .chip {
      padding: 4px 10px; border-radius: 999px;
      background: var(--panel); border: 1px solid var(--line);
    }
    .regime .chip strong { color: var(--txt); }

    .tabs {
      display: flex; gap: 6px; margin: 14px 20px 0;
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 10px 16px; border-radius: 10px 10px 0 0;
      background: var(--panel); border: 1px solid var(--line); border-bottom: none;
      color: var(--mut); cursor: pointer; user-select: none;
      font-weight: 600; white-space: nowrap; flex-shrink: 0;
      scroll-snap-align: start;
      min-height: 44px; display: inline-flex; align-items: center;
    }
    .tab.active { background: var(--panel-2); color: var(--txt); }
    .tab .count { color: var(--mut); margin-left: 6px; font-weight: 400; font-size: 12px; }

    .filters {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      padding: 10px 20px; background: var(--panel-2);
      border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    }
    .filters label { color: var(--mut); font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .filters select, .filters input[type=text] {
      background: var(--panel); color: var(--txt); border: 1px solid var(--line);
      border-radius: 8px; padding: 8px 10px; font-size: 14px;
      min-height: 36px;
    }
    .filters input[type=text] { -webkit-appearance: none; }
    .filters .toggle { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; min-height: 36px; }
    .filters .toggle input { accent-color: var(--acc); width: 18px; height: 18px; }

    main { padding: 16px 20px 80px; }

    .grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    }

    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; padding: 14px; position: relative;
      transition: transform .12s ease, border-color .2s ease;
      touch-action: manipulation;
    }
    @media (hover: hover) {
      .card:hover { transform: translateY(-1px); border-color: #3a4a78; }
    }
    .card:active { transform: scale(.99); }
    .card.blocked { opacity: .55; }
    .card.v3 { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(251,191,36,.18); }
    .card.v2 { border-color: #6c7be0; }

    .card .top {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .card .name {
      font-size: 16px; font-weight: 700;
    }
    .card .ticker {
      font-size: 11px; color: var(--mut); margin-left: 4px; font-weight: 400;
    }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 700; border: 1px solid transparent;
    }
    .badge.v3 { background: rgba(251,191,36,.15); color: var(--gold); border-color: rgba(251,191,36,.4); }
    .badge.v2 { background: rgba(108,123,224,.15); color: #a3afff; border-color: rgba(108,123,224,.4); }
    .badge.v1 { background: rgba(138,151,192,.12); color: var(--mut); border-color: rgba(138,151,192,.25); }
    .badge.A { background: rgba(76,194,255,.15); color: var(--a); border-color: rgba(76,194,255,.35); }
    .badge.B { background: rgba(192,132,252,.15); color: var(--b); border-color: rgba(192,132,252,.35); }
    .badge.AB { background: linear-gradient(90deg, rgba(76,194,255,.18), rgba(192,132,252,.18)); color: #d3e8ff; border-color: #5b6db8; }
    .badge.watch { background: rgba(138,151,192,.12); color: var(--mut); border-color: rgba(138,151,192,.25); }
    .badge.g80 { background: linear-gradient(90deg, #ff6b35, #f7931e); color: #fff; border-color: #f7931e; }
    .badge.g60 { background: rgba(34,197,94,.2); color: #6ee7b7; border-color: rgba(34,197,94,.5); }
    .badge.g40 { background: rgba(245,158,11,.15); color: #fcd34d; border-color: rgba(245,158,11,.4); }
    .badge.g20 { background: rgba(138,151,192,.12); color: #a3afff; border-color: rgba(108,123,224,.3); }

    .genuine-bd {
      font-size: 11px; color: var(--mut); margin-bottom: 8px;
      padding: 6px 8px; background: rgba(76,194,255,.05);
      border: 1px dashed rgba(76,194,255,.25); border-radius: 6px;
    }
    .genuine-bd b { color: var(--txt); }

    .card .badges { display: flex; gap: 4px; flex-wrap: wrap; }

    .card .meta {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
      font-size: 12px; color: var(--mut); margin-bottom: 10px;
    }
    .card .meta b { color: var(--txt); font-weight: 600; }

    .signals { font-size: 12px; color: var(--mut); margin-bottom: 10px; }
    .signals .line { padding: 2px 0; }

    .levels {
      background: var(--panel-2); border-radius: 10px; padding: 8px 10px;
      font-size: 12px; line-height: 1.7;
    }
    .levels .row { display: flex; justify-content: space-between; gap: 8px; }
    .levels .row span:first-child { color: var(--mut); }
    .levels .stop { color: var(--bad); }
    .levels .tp1, .levels .tp2 { color: var(--good); }
    .levels .entry { color: var(--acc); }

    .footer-line {
      margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--line);
      display: flex; justify-content: space-between; align-items: center; font-size: 12px;
    }
    .footer-line .action {
      font-weight: 700;
    }
    .action.gold { color: var(--gold); }
    .action.ok { color: var(--good); }
    .action.watch { color: var(--mut); }
    .action.block { color: var(--bad); }
    .pos {
      color: var(--mut);
    }
    .pos b { color: var(--txt); }

    .block-reasons {
      margin-top: 8px; font-size: 11px; color: var(--bad);
      padding: 6px 8px; background: rgba(239,68,68,.08); border-radius: 6px;
      border: 1px solid rgba(239,68,68,.25);
    }

    .ext-links {
      margin-top: 10px; font-size: 12px; display: flex; gap: 6px; flex-wrap: wrap;
    }
    .ext-links a {
      color: var(--mut);
      padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px;
      background: var(--panel-2);
      min-height: 32px; display: inline-flex; align-items: center;
    }
    .ext-links a:hover, .ext-links a:active { color: var(--acc); border-color: var(--acc); background: rgba(76,194,255,.08); }

    .empty {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
      color: var(--mut);
    }

    .stale-warning {
      background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.4);
      color: var(--warn); padding: 10px 14px; border-radius: 10px;
      margin: 12px 20px 0; font-size: 12px;
    }

    /* === 태블릿 (~900px) === */
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
    }

    /* === 모바일 폰 (~640px) === */
    @media (max-width: 640px) {
      h1 { font-size: 18px; }
      h1 .sub { display: block; margin: 4px 0 0; }
      header { padding: 12px 14px 8px; }
      main { padding: 10px 12px 100px; }
      .tabs { margin: 10px 12px 0; gap: 4px; }
      .tab { padding: 9px 12px; font-size: 13px; }
      .filters {
        padding: 8px 12px; gap: 6px;
        flex-direction: row; flex-wrap: wrap;
      }
      .filters label { font-size: 11px; }
      .filters select { font-size: 13px; padding: 7px 8px; max-width: 100%; }
      .filters input[type=text] { font-size: 14px; flex: 1; min-width: 0; }
      .filters .toggle { font-size: 12px; }

      .regime { gap: 6px; }
      .regime .chip { font-size: 11px; padding: 3px 8px; }

      .grid { grid-template-columns: 1fr; gap: 10px; }
      .card { padding: 12px; border-radius: 12px; }
      .card .name { font-size: 15px; }
      .card .meta { font-size: 11px; grid-template-columns: 1fr 1fr; gap: 2px 8px; }
      .levels { font-size: 11px; line-height: 1.6; }
      .genuine-bd { font-size: 10px; padding: 5px 7px; }
      .ext-links { gap: 5px; }
      .ext-links a { padding: 5px 8px; font-size: 11px; }
      .stale-warning { margin: 10px 12px 0; font-size: 11px; padding: 8px 10px; }
    }

    /* === 매우 작은 화면 (~380px, iPhone SE 등) === */
    @media (max-width: 380px) {
      .card .meta { grid-template-columns: 1fr; }
      .filters label { font-size: 10px; }
      .filters select { padding: 6px 8px; font-size: 12px; }
      .tab { padding: 8px 10px; font-size: 12px; }
    }

    /* === 다크 모드 외 시스템 설정 대응 === */
    @media (prefers-reduced-motion: reduce) {
      .card { transition: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 진짜 갈놈 <span class="sub">3중 검증 추천주 대시보드</span></h1>
    <div class="regime" id="regime"></div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" data-cat="GENUINE">💎 진짜 갈놈 <span class="count" id="cnt-GENUINE">-</span></div>
    <div class="tab" data-cat="A">🅰️ 지금 진입 <span class="count" id="cnt-A">-</span></div>
    <div class="tab" data-cat="B">🅱️ 장기 매집 <span class="count" id="cnt-B">-</span></div>
    <div class="tab" data-cat="V3">🏆 3중 검증만 <span class="count" id="cnt-V3">-</span></div>
  </div>

  <div class="filters">
    <label class="toggle"><input type="checkbox" id="f-hide-blocked" checked /> 회피 종목 숨기기</label>
    <label>최소 검증도
      <select id="f-min-v">
        <option value="1" selected>1중 이상</option>
        <option value="2">2중 이상</option>
        <option value="3">3중만</option>
      </select>
    </label>
    <label>정렬
      <select id="f-sort">
        <option value="default">기본(탭별)</option>
        <option value="genuine">💎 진짜 갈놈 점수</option>
        <option value="score">합산 점수</option>
        <option value="price">가격 오름차순</option>
        <option value="price_desc">가격 내림차순</option>
      </select>
    </label>
    <label>검색
      <input type="text" id="f-search" placeholder="종목명/코드/테마" />
    </label>
  </div>

  <div id="stale" class="stale-warning" style="display:none"></div>

  <main>
    <div id="grid" class="grid">
      <div class="empty" id="loading">⏳ 데이터 로딩 중…</div>
    </div>
  </main>

  <!-- __EMBEDDED_DATA__ -->
  <!-- 빌드 시 main.py가 위 마커를 <script>window.EMBEDDED_DATA={...}</script> 로 치환 -->

  <script>
    const state = {
      data: null,
      cat: 'GENUINE',
      hideBlocked: true,
      minV: 1,            // 진짜 갈놈 탭은 1중 검증도 포함 (미발견 보석 노출)
      sort: 'default',
      search: '',
    };

    const fmtPrice = (n) => n == null ? '-' : Number(n).toLocaleString('ko-KR');
    const fmtPct = (n) => n == null ? '-' : (Number(n) >= 0 ? '+' : '') + Number(n).toFixed(1) + '%';
    const safe = (s) => (s ?? '').toString();

    async function load() {
      console.log('[진짜갈놈] load 시작');
      console.log('[진짜갈놈] window.EMBEDDED_DATA 존재 여부:', !!window.EMBEDDED_DATA);
      if (window.EMBEDDED_DATA) {
        state.data = window.EMBEDDED_DATA;
        console.log('[진짜갈놈] 임베디드 데이터 사용. stocks=', state.data.stocks?.length);
      } else {
        console.log('[진짜갈놈] fetch fallback 시도');
        try {
          const r = await fetch('unified_results.json?t=' + Date.now());
          if (!r.ok) throw new Error('HTTP ' + r.status);
          state.data = await r.json();
          console.log('[진짜갈놈] fetch 성공. stocks=', state.data.stocks?.length);
        } catch (err) {
          throw new Error('데이터 로드 실패 (data.js·unified_results.json 모두 접근 불가): ' + err.message);
        }
      }
      renderRegime();
      renderCounts();
      renderStaleCheck();
      render();
    }

    function renderRegime() {
      const r = state.data.regime || {};
      const m = state.data.meta || {};
      const sm = m.sources?.smart_money?.scan_at || '-';
      const nh = m.sources?.new_high?.scan_at || '-';
      const dv = m.sources?.divergence?.scan_at || '-';
      document.getElementById('regime').innerHTML = `
        <div class="chip">📡 시장 레짐: <strong>${safe(r.smart_money_label) || '-'}</strong> (${r.smart_money_score ?? '-'}/100)</div>
        <div class="chip">📊 신고가 추세: <strong>${safe(r.new_high_breadth_trend) || '-'}</strong> 커버리지 ${r.new_high_breadth_scan ?? '-'}%</div>
        <div class="chip">💡 ${safe(r.smart_money_advice) || ''}</div>
        <div class="chip">🕒 스캔: SM ${sm.slice(0,16)} · NH ${nh.slice(0,16)} · DV ${dv.slice(0,16)}</div>
      `;
    }

    function renderCounts() {
      const stocks = state.data.stocks || [];
      const pass = (s) => {
        if (s.verification < state.minV) return false;
        if (state.hideBlocked && s.block_reasons && s.block_reasons.length) return false;
        return true;
      };
      const a = stocks.filter(s => (s.category === 'A' || s.category === 'AB') && pass(s)).length;
      const b = stocks.filter(s => (s.category === 'B' || s.category === 'AB') && pass(s)).length;
      const v3 = stocks.filter(s => s.verification === 3 && pass(s)).length;
      const genuine = stocks.filter(s => (s.genuine_score || 0) >= 40 && pass(s)).length;
      document.getElementById('cnt-A').textContent = a;
      document.getElementById('cnt-B').textContent = b;
      document.getElementById('cnt-V3').textContent = v3;
      document.getElementById('cnt-GENUINE').textContent = genuine;
    }

    function renderStaleCheck() {
      const m = state.data.meta || {};
      const sources = m.sources || {};
      const today = new Date();
      const stale = [];
      for (const [name, info] of Object.entries(sources)) {
        if (!info.scan_at) continue;
        const at = new Date(info.scan_at);
        if (isNaN(at)) continue;
        const hours = (today - at) / 3600000;
        if (hours > 30) stale.push(`${name}: ${hours.toFixed(0)}시간 경과`);
      }
      const el = document.getElementById('stale');
      if (stale.length) {
        el.style.display = 'block';
        el.textContent = '⚠️ 데이터 신선도 경고 — ' + stale.join(' · ');
      } else {
        el.style.display = 'none';
      }
    }

    function filterStocks() {
      let list = (state.data.stocks || []).slice();
      // 카테고리
      if (state.cat === 'GENUINE') {
        list = list.filter(s => (s.genuine_score || 0) >= 40);
      } else if (state.cat === 'A') {
        list = list.filter(s => s.category === 'A' || s.category === 'AB');
      } else if (state.cat === 'B') {
        list = list.filter(s => s.category === 'B' || s.category === 'AB');
      } else if (state.cat === 'V3') {
        list = list.filter(s => s.verification === 3);
      }
      // 검증도
      list = list.filter(s => s.verification >= state.minV);
      // 회피 숨김
      if (state.hideBlocked) {
        list = list.filter(s => !s.block_reasons || s.block_reasons.length === 0);
      }
      // 검색
      if (state.search) {
        const q = state.search.toLowerCase();
        list = list.filter(s =>
          s.ticker.includes(q) ||
          (s.name || '').toLowerCase().includes(q) ||
          (s.themes || []).some(t => t.toLowerCase().includes(q))
        );
      }
      // 정렬
      if (state.cat === 'GENUINE' && state.sort === 'default') {
        // 💎 탭 기본 정렬은 genuine_score 내림차순
        list.sort((a,b) => (b.genuine_score||0) - (a.genuine_score||0));
      } else if (state.sort === 'genuine') {
        list.sort((a,b) => (b.genuine_score||0) - (a.genuine_score||0));
      } else if (state.sort === 'score') {
        list.sort((a,b) => b.combined_score - a.combined_score);
      } else if (state.sort === 'price') {
        list.sort((a,b) => (a.current_price ?? 1e15) - (b.current_price ?? 1e15));
      } else if (state.sort === 'price_desc') {
        list.sort((a,b) => (b.current_price ?? 0) - (a.current_price ?? 0));
      }
      return list;
    }

    function renderCard(s) {
      const vBadge = `<span class="badge v${s.verification}">${s.verification}중</span>`;
      const catLabel = s.category === 'AB' ? '🅰️🅱️ 황금' :
                       s.category === 'A'  ? '🅰️ 단기' :
                       s.category === 'B'  ? '🅱️ 매집' :
                       s.category === 'watch' ? '👀 워치' : s.category;
      const cBadge = `<span class="badge ${s.category}">${catLabel}</span>`;
      const g = s.genuine_score || 0;
      const gBd = s.genuine_breakdown || {};
      const gRank = s.genuine_rank_emoji || '';
      const gBadge = g >= 30 ? `<span class="badge g${g>=80?'80':g>=60?'60':g>=40?'40':'20'}">${gRank} ${g}점 ${s.genuine_rank||''}</span>` : '';
      const themes = (s.themes || []).slice(0,3).map(t => `<span class="ticker">#${t}</span>`).join(' ');
      const signals = (s.signals_summary || []).map(l => `<div class="line">${l}</div>`).join('');
      const t = s.trading || {};
      const levels = `
        <div class="levels">
          <div class="row"><span>📥 진입</span><span class="entry">${fmtPrice(t.entry)}</span></div>
          <div class="row"><span>🛑 손절</span><span class="stop">${fmtPrice(t.stop)}</span></div>
          <div class="row"><span>🎯 익절1</span><span class="tp1">${fmtPrice(t.tp1)}</span></div>
          <div class="row"><span>🎯 익절2</span><span class="tp2">${fmtPrice(t.tp2)}</span></div>
        </div>
      `;
      const actionCls = s.block_reasons?.length ? 'block' :
                        s.verification === 3 ? 'gold' :
                        s.verification === 2 ? 'ok' : 'watch';
      const blocked = s.block_reasons?.length
        ? `<div class="block-reasons">⚠️ ${s.block_reasons.join(' · ')}</div>`
        : '';
      const vClass = s.verification === 3 ? ' v3' : s.verification === 2 ? ' v2' : '';
      return `
        <div class="card${vClass} ${s.block_reasons?.length ? 'blocked' : ''}">
          <div class="top">
            <div>
              <span class="name">${safe(s.name)}</span>
              <span class="ticker">${s.ticker} · ${safe(s.market)}</span>
            </div>
            <div class="badges">${gBadge} ${vBadge} ${cBadge}</div>
          </div>
          <div class="meta">
            <div>합산점수 <b>${s.combined_score}</b></div>
            <div>현재가 <b>${fmtPrice(s.current_price)}원</b></div>
            <div>권장비중 <b>${s.position_size_pct}%</b></div>
            <div>소스 <b>${(s.sources || []).length}/3</b></div>
          </div>
          ${g >= 30 ? `<div class="genuine-bd">매집 <b>${gBd.accumulation||0}</b>/30 · 출발 <b>${gBd.ignition||0}</b>/35 · 추세 <b>${gBd.trend||0}</b>/25 · 폭발력 <b>${gBd.explosion||0}</b>/10</div>` : ''}
          ${themes ? `<div class="signals"><div class="line">${themes}</div></div>` : ''}
          <div class="signals">${signals}</div>
          ${levels}
          ${blocked}
          <div class="footer-line">
            <span class="action ${actionCls}">${s.action_emoji} ${s.action}</span>
            <span class="pos">비중 <b>${s.position_size_pct}%</b></span>
          </div>
          <div class="ext-links">
            <a href="https://finance.naver.com/item/main.naver?code=${s.ticker}" target="_blank" rel="noopener">📊 네이버</a>
            <a href="https://m.stock.naver.com/domestic/stock/${s.ticker}/total" target="_blank" rel="noopener">📱 모바일</a>
            <a href="https://stockanalysis.com/quote/krx/${s.ticker}/" target="_blank" rel="noopener">🌐 SA</a>
          </div>
        </div>
      `;
    }

    function render() {
      const list = filterStocks();
      const grid = document.getElementById('grid');
      if (!list.length) {
        grid.innerHTML = `<div class="empty">조건에 맞는 종목이 없습니다.<br/><small>필터를 완화하거나 다른 탭을 확인해보세요.</small></div>`;
      } else {
        grid.innerHTML = list.map(renderCard).join('');
      }
      renderCounts(); // 필터 변경 시 탭 카운트 갱신
    }

    // 이벤트
    document.getElementById('tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.cat = tab.dataset.cat;
      render();
    });
    document.getElementById('f-hide-blocked').addEventListener('change', (e) => {
      state.hideBlocked = e.target.checked; render();
    });
    document.getElementById('f-min-v').addEventListener('change', (e) => {
      state.minV = parseInt(e.target.value, 10); render();
    });
    document.getElementById('f-sort').addEventListener('change', (e) => {
      state.sort = e.target.value; render();
    });
    document.getElementById('f-search').addEventListener('input', (e) => {
      state.search = e.target.value.trim(); render();
    });

    load().catch(err => {
      document.getElementById('grid').innerHTML = `<div class="empty">⚠️ 데이터 로드 실패: ${err.message}</div>`;
    });
  </script>
</body>
</html>
