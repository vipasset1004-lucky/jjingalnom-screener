name: scan

on:
  schedule:
    # 기존 3개 스크리너가 끝난 뒤 10분 후 트리거
    # KST 16:10 → UTC 07:10  /  KST 21:10 → UTC 12:10
    - cron: "10 7 * * 1-5"
    - cron: "10 12 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  cross-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cross-validate 3 screeners
        run: python -m src.main

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add unified_results.json last_update.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "scan: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

  deploy:
    needs: cross-validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
